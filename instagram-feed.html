<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prints by Angel – Instagram Feed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: transparent;
    }

    #igWrap {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 10px;
      background: transparent;
      min-height: 80px;
    }

    #igFeedGrid {
      display: grid;
      gap: 16px;
      padding: 2px;
    }

    .ig-tile {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: #f1f5f9;
      cursor: pointer;
      box-shadow: 0 1px 3px rgba(0,0,0,.10);
      aspect-ratio: 1/1;
    }

    .ig-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .45s cubic-bezier(.4,0,.2,1);
    }
    .ig-tile:hover img { transform: scale(1.08); }

    .ig-ov {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 12px;
      background: linear-gradient(to top, rgba(0,0,0,.78), rgba(0,0,0,0) 62%);
      opacity: 0;
      transition: opacity .22s ease;
      pointer-events: none;
    }
    .ig-tile:hover .ig-ov { opacity: 1; }

    .ig-ov p {
      margin: 0;
      color: #fff;
      font-weight: 700;
      font-size: 12px;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ig-msg {
      font-size: 13px;
      color: #64748b;
      padding: 10px 2px 0 2px;
    }

    .ig-err {
      border: 1px solid #fecaca;
      background: #fef2f2;
      color: #991b1b;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div id="igWrap">
    <div id="igFeedGrid"></div>
    <div id="igFeedMsg" class="ig-msg">Loading…</div>
    <div id="igFeedErr" style="display:none;" class="ig-err"></div>
  </div>

  <script>
  (function(){
    var GAS_URL = "https://script.google.com/macros/s/AKfycby0o2s2go-Jt9w7yTd0kNrkKbFpgbTthUhGqe1pJfnachkKHlKv37hBCgI6yT-ELQOf/exec";

    var LIMIT_DESKTOP = 12;
    var LIMIT_MOBILE  = 6;
    var MOBILE_BREAKPOINT = 640;
    var MIN_TILE_PX = 220;
    var TIMEOUT_MS = 20000;

    var grid = document.getElementById("igFeedGrid");
    var msg  = document.getElementById("igFeedMsg");
    var err  = document.getElementById("igFeedErr");

    function currentLimit(){
      return (window.innerWidth <= MOBILE_BREAKPOINT) ? LIMIT_MOBILE : LIMIT_DESKTOP;
    }

    function setGridColumns(){
      grid.style.gridTemplateColumns = "repeat(auto-fit, minmax(" + MIN_TILE_PX + "px, 1fr))";
    }

    function showError(message){
      err.style.display = "block";
      err.textContent = message;
    }

    function render(items){
      grid.innerHTML = "";
      setGridColumns();
      var lim = currentLimit();
      var count = 0;

      for (var i = 0; i < items.length && count < lim; i++){
        var it = items[i];
        var imgUrl = it.media_url || it.mediaUrl || it.image_url || "";
        var link = it.permalink || it.link || imgUrl;
        var caption = (it.caption || it.text || "").replace(/\s+/g," ").trim();
        var mediaType = (it.media_type || "").toUpperCase();

        // For videos, prefer thumbnail
        if (mediaType === "VIDEO"){
          imgUrl = it.thumbnail_url || it.thumbnailUrl || imgUrl;
        }

        if (!imgUrl || !/^(https?:\/\/|data:)/i.test(imgUrl)) continue;

        var tile = document.createElement("div");
        tile.className = "ig-tile";
        tile.onclick = (function(url){ return function(){ window.open(url, "_blank", "noopener"); }; })(link);

        var img = document.createElement("img");
        img.loading = "lazy";
        img.src = imgUrl;
        img.alt = "Instagram post";
        tile.appendChild(img);

        var ov = document.createElement("div");
        ov.className = "ig-ov";
        var p = document.createElement("p");
        p.textContent = caption || "View on Instagram";
        ov.appendChild(p);
        tile.appendChild(ov);

        grid.appendChild(tile);
        count++;
      }

      msg.textContent = count ? "" : "No items returned.";
    }

    function load(){
      err.style.display = "none";
      msg.textContent = "Loading…";
      setGridColumns();

      var lim = currentLimit();
      var url = GAS_URL + "?limit=" + lim + "&force=1&_t=" + Date.now();

      var ctrl = new AbortController();
      var t = setTimeout(function(){ ctrl.abort(); }, TIMEOUT_MS);

      fetch(url, { cache: "no-store", credentials: "omit", signal: ctrl.signal })
        .then(function(res){ return res.json(); })
        .then(function(json){
          clearTimeout(t);
          if (json.error){
            msg.textContent = "";
            showError(json.error + (json.message ? ": " + json.message : ""));
            return;
          }
          var items = json.items || json.data || (Array.isArray(json) ? json : []);
          if (!items.length){
            msg.textContent = "";
            showError("No items found.");
            return;
          }
          render(items);
        })
        .catch(function(e){
          clearTimeout(t);
          msg.textContent = "";
          showError("Error loading feed: " + (e.message || e));
        });
    }

    window.addEventListener("resize", setGridColumns);
    load();
  })();
  </script>
</body>
</html>
